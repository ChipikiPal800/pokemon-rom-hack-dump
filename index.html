<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pokémon Fan Games Hub | fanterOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f5a623 0%, #cc7a00 100%);
            font-family: 'DM Sans', system-ui, sans-serif;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        .game-selection {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(245, 166, 35, 0.96), rgba(204, 122, 0, 0.96));
            z-index: 20000;
            overflow-y: auto;
            padding: 2rem 1.5rem;
            transition: opacity 0.3s ease;
        }
        .game-selection.hide { opacity: 0; pointer-events: none; }

        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #cc0000, #ffde00, #3b7d3b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .header p { color: #fff; font-weight: 600; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .badge-row { display: flex; justify-content: center; gap: 0.8rem; margin-top: 0.8rem; flex-wrap: wrap; }
        .badge {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 40px;
            padding: 4px 14px;
            font-size: 0.7rem;
            color: #ffde00;
            font-weight: bold;
        }

        .toolbar { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin-bottom: 2rem; align-items: center; }
        .search-box {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 222, 0, 0.5);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }
        .search-box:focus-within { border-color: #ffde00; }
        #searchInput {
            background: transparent;
            border: none;
            color: white;
            font-size: 0.9rem;
            width: 260px;
            outline: none;
        }
        #searchInput::placeholder { color: #ffddaa; }
        .stats-badge {
            background: rgba(0, 0, 0, 0.4);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #ffde00;
            font-weight: bold;
        }
        .stats-badge span { color: white; }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .game-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 222, 0, 0.3);
            border-radius: 20px;
            padding: 0.9rem 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .game-card:hover {
            transform: translateY(-3px);
            border-color: #ffde00;
            background: rgba(0, 0, 0, 0.6);
        }

        .game-icon { font-size: 2rem; min-width: 52px; }
        .game-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: #ffde00;
        }
        .game-badge {
            background: rgba(0, 0, 0, 0.6);
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 20px;
            color: #ffaa66;
            margin-left: 6px;
        }

        .no-results { text-align: center; grid-column: 1 / -1; padding: 3rem; background: rgba(0,0,0,0.3); border-radius: 48px; color: #ffde00; }
        .footer { text-align: center; margin-top: 3rem; font-size: 0.7rem; color: rgba(255,255,255,0.6); }

        .fullscreen-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 10000;
            flex-direction: column;
        }
        .fullscreen-modal.active { display: flex; }
        .fullscreen-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 1px solid #ffde00;
        }
        .fullscreen-title { color: #ffde00; font-weight: bold; }
        .fullscreen-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
        }
        .fullscreen-close:hover { color: #ffde00; }
        .fullscreen-content { flex: 1; display: flex; justify-content: center; align-items: center; background: #000; }
        #fullscreenEmulator { width: 100%; height: 100%; }

        .letter-jump { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4rem; margin-bottom: 1.5rem; }
        .letter-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #ffde00;
            border-radius: 8px;
            padding: 0.3rem 0.7rem;
            font-size: 0.7rem;
            font-weight: bold;
            color: #ffde00;
            cursor: pointer;
        }
        .letter-btn:hover { background: #ffde00; color: #8b0000; }
        .letter-btn.active { background: #ffde00; color: #8b0000; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 640px) {
            body { padding: 1rem; }
            .games-grid { grid-template-columns: 1fr; }
            .search-box #searchInput { width: 160px; }
        }
    </style>
</head>
<body>

<div class="game-selection" id="gameSelection">
    <div class="header">
        <h1>⚡ POKÉMON FAN GAMES ⚡</h1>
        <p>1000+ fan-made Pokémon adventures — ROM hacks, fan games, and more!</p>
        <div class="badge-row">
            <div class="badge">🎮 1000+ Fan Games</div>
            <div class="badge">⚡ Fullscreen Play</div>
            <div class="badge">💾 Save States</div>
            <div class="badge">✨ GBA/GB/GBC</div>
        </div>
    </div>

    <div class="toolbar">
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="search Pokémon fan games...">
        </div>
        <div class="stats-badge">
            📚 <span id="totalCount">0</span> fan games
        </div>
    </div>

    <div class="letter-jump" id="letterJump"></div>
    <div id="gamesContainer" class="games-grid"></div>

    <div class="footer">
        <span>⚡ Gotta Play 'Em All! ⚡</span>
    </div>
</div>

<div id="fullscreenModal" class="fullscreen-modal">
    <div class="fullscreen-header">
        <span class="fullscreen-title" id="fullscreenGameTitle">Pokémon Fan Game</span>
        <button class="fullscreen-close" id="fullscreenCloseBtn">✕</button>
    </div>
    <div class="fullscreen-content">
        <div id="fullscreenEmulator"></div>
    </div>
</div>

<script>
    const FOLDER_ID = '1hdxQGVA8QSmmaB87F7wu_hDl0O09KUOp';
    const API_KEY = 'AIzaSyAL1l3O7Jr8M635xZsxT3jI9yE-yp13KTc';
    
    let romLibrary = [];
    let currentLetter = 'all';
    let searchTerm = '';
    let currentEmulator = null;
    
    async function fetchGames() {
        const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents&key=${API_KEY}&fields=files(id,name)&pageSize=1000`;
        const response = await fetch(url);
        const data = await response.json();
        
        if (!data.files) return [];
        
        const games = data.files
            .filter(f => {
                const name = f.name.toLowerCase();
                return name.endsWith('.zip') || name.endsWith('.gba') || name.endsWith('.gb') || name.endsWith('.gbc');
            })
            .map(f => ({
                id: f.id,
                name: f.name.replace(/\.(zip|gba|gb|gbc)$/i, ''),
                ext: f.name.split('.').pop().toUpperCase()
            }));
        
        games.sort((a, b) => a.name.localeCompare(b.name));
        return games;
    }
    
    function destroyEmulator() {
        if (currentEmulator) {
            try {
                if (typeof currentEmulator.destroy === 'function') currentEmulator.destroy();
                currentEmulator = null;
            } catch(e) {}
        }
        if (window.EJS_emulator) {
            try {
                if (typeof window.EJS_emulator.destroy === 'function') window.EJS_emulator.destroy();
                window.EJS_emulator = null;
            } catch(e) {}
        }
        if (window.audioCtx) {
            try { window.audioCtx.close(); } catch(e) {}
            window.audioCtx = null;
        }
        const emulatorDiv = document.getElementById('fullscreenEmulator');
        if (emulatorDiv) emulatorDiv.innerHTML = '';
    }
    
    async function playGame(fileId, gameName) {
        document.getElementById('fullscreenGameTitle').textContent = gameName;
        document.getElementById('fullscreenModal').classList.add('active');
        document.getElementById('gameSelection').classList.add('hide');
        
        destroyEmulator();
        
        try {
            const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${API_KEY}`;
            const response = await fetch(url);
            const blob = await response.blob();
            launchEmulator(URL.createObjectURL(blob), gameName);
        } catch (error) {
            console.error('Error:', error);
            alert('Failed to load game: ' + error.message);
            document.getElementById('fullscreenModal').classList.remove('active');
            document.getElementById('gameSelection').classList.remove('hide');
        }
    }
    
    function launchEmulator(romUrl, gameName) {
        const emulatorDiv = document.getElementById('fullscreenEmulator');
        emulatorDiv.innerHTML = '';
        
        window.EJS_DEBUG_XX = true;
        window.EJS_ignoreGamepad = true;
        window.EJS_WebGL2 = false;
        window.EJS_recanvas = true;
        window.EJS_video = 'webgl1';
        
        window.EJS_player = '#fullscreenEmulator';
        window.EJS_core = 'gba';
        window.EJS_gameName = gameName;
        window.EJS_color = '#ffcc00';
        window.EJS_startOnLoaded = true;
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_gameUrl = romUrl;
        window.EJS_buttons = { playPause: false, restart: true, mute: false, settings: true, fullscreen: true, saveState: true, loadState: true };
        
        const oldScript = document.querySelector('script[src*="emulatorjs"][src*="loader"]');
        if (oldScript) oldScript.remove();
        
        const script = document.createElement('script');
        script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
        script.onload = () => {
            setTimeout(() => {
                if (window.EJS_emulator) currentEmulator = window.EJS_emulator;
            }, 500);
        };
        document.body.appendChild(script);
    }
    
    function closeEmulator() {
        destroyEmulator();
        document.getElementById('fullscreenModal').classList.remove('active');
        document.getElementById('fullscreenEmulator').innerHTML = '';
        document.getElementById('gameSelection').classList.remove('hide');
    }
    
    function renderGames() {
        let filtered = romLibrary;
        if (searchTerm) {
            filtered = romLibrary.filter(g => g.name.toLowerCase().includes(searchTerm.toLowerCase()));
        }
        if (currentLetter !== 'all') {
            filtered = filtered.filter(g => g.name.charAt(0).toUpperCase() === currentLetter);
        }
        
        document.getElementById('totalCount').innerText = filtered.length;
        const container = document.getElementById('gamesContainer');
        
        if (filtered.length === 0) {
